<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Financial AI Assistant</title>

<style>
/* ===== Reset & Body ===== */
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #0f172a;
    color: #f1f5f9;
    margin: 0;
    display: flex;
    flex-direction: column;
    height: 100vh;
}

/* ===== Chat Container ===== */
.chat {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
    scroll-behavior: smooth;
}

/* ===== Message Bubbles ===== */
.msg {
    padding: 14px 18px;
    margin: 10px 0;
    border-radius: 12px;
    max-width: 65%;
    word-wrap: break-word;
    line-height: 1.4;
    font-size: 0.95rem;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    animation: fadeIn 0.3s ease-in-out;
}

.user {
    background: #2563eb;
    margin-left: auto;
    color: white;
}

.bot {
    background: #1e293b;
    margin-right: auto;
    color: #f1f5f9;
}

/* ===== Input Area ===== */
.input-bar {
    display: flex;
    padding: 12px 15px;
    background: #1e293b;
    align-items: center;
    gap: 10px;
    border-top: 1px solid #334155;
}

input[type=text] {
    flex: 1;
    padding: 12px 15px;
    border-radius: 8px;
    border: none;
    outline: none;
    font-size: 1rem;
    background: #0f172a;
    color: white;
}

input[type=file] {
    color: #f1f5f9;
}

button {
    padding: 12px 20px;
    border-radius: 8px;
    border: none;
    background: #2563eb;
    color: white;
    cursor: pointer;
    font-weight: bold;
    transition: background 0.2s;
}

button:hover {
    background: #1d4ed8;
}

/* ===== Scrollbar Styling ===== */
.chat::-webkit-scrollbar {
    width: 8px;
}

.chat::-webkit-scrollbar-track {
    background: #0f172a;
}

.chat::-webkit-scrollbar-thumb {
    background: #2563eb;
    border-radius: 4px;
}

/* ===== Fade-in Animation ===== */
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(5px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<div class="chat" id="chat"></div>

<div class="input-bar">
    <input type="file" id="file">
    <input type="text" id="message" placeholder="Ask about finance...">
    <button onclick="sendMessage()">Send</button>
</div>

<script>
const messageInput = document.getElementById("message")

// Send on Enter
messageInput.addEventListener("keypress", function(e){
    if(e.key === "Enter"){
        sendMessage()
    }
})

async function sendMessage(){
    let message = messageInput.value.trim()
    let file = document.getElementById("file").files[0]

    if(message === "" && !file){
        return
    }

    addMessage(message,"user")
    messageInput.value=""

    let form = new FormData()
    form.append("message",message)
    if(file) form.append("file",file)

    let loading = addMessage("Thinking...","bot")

    try{
        let res = await fetch("http://127.0.0.1:8000/chat",{
            method:"POST",
            body: form
        })

        let data = await res.json()
        loading.innerText = data.reply

    }catch(err){
        loading.innerText = "Error connecting to AI server."
    }
}

// Add message bubble
function addMessage(text,type){
    let div = document.createElement("div")
    div.className = "msg " + type
    div.innerText = text
    document.getElementById("chat").appendChild(div)

    // Auto scroll
    document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight
    return div
}
</script>

</body>
</html>
